<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="hud-container">
        <!-- GTA Online Style layout: Bank is traditionally on top, followed by Cash -->
        <div id="bank-container" class="hud-row"><span class="money-sign">$</span><span id="bank-amount">0</span></div>
        <div id="cash-container" class="hud-row"><span class="money-sign">$</span><span id="cash-amount">0</span></div>
        <div id="black-container" class="hud-row"><span class="money-sign">$</span><span id="black-amount">0</span></div>
        <div id="id-container" class="hud-row">ID: <span id="server-id">0</span></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
